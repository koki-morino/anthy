name: CI
on:
  push:
  pull_request:
jobs:
  build-and-run:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [
          macos-latest,
          ubuntu-latest,
          windows-latest
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Meson and Ninja
        run: python -m pip install --upgrade pip meson ninja
      - name: Install musl toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: musl-gcc
        run: meson setup build -Ddefault_library=static
      - name: Configure
        if: runner.os != 'Linux'
        run: meson setup build -Ddefault_library=static
      - name: Build
        run: meson compile -C build
      - name: Run
        shell: bash
        run: |
          printf 'こんにちは\n' | ./build/test/cli${{ runner.os == 'Windows' && '.exe' || '' }}
